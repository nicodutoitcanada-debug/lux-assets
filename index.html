<!DOCTYPE html>
<html lang="en">
<head>
<title>LUX VISUALIZER</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:"Futura PT",sans-serif;
}

/* ===============================
   PIXEL STREAM
================================*/

#video-container{
width:100vw;
height:100vh;
position:relative;
z-index:1;
}

/* ===============================
   INTRO VIDEO OVERLAY
================================*/

#introOverlay{
position:fixed;
inset:0;
background:black;
display:flex;
align-items:center;
justify-content:center;
z-index:5000;
pointer-events:none;
opacity:1;
transition:opacity 1s ease;
}

/* Unreal logo */

#unrealLogo{
position:absolute;
width:180px;
opacity:0;
transform:scale(0.96);
transition:
opacity 1s ease,
transform 2s ease;
z-index:2;
}

/* Intro video */

#introVideo{
width:100vw;
height:100vh;
object-fit:cover;
opacity:0;
transition:opacity 1s ease;
}

/* ===============================
   BLACK FADE
================================*/

#blackFade{
position:fixed;
inset:0;
background:black;
opacity:0;
z-index:4000;
pointer-events:none;
transition:opacity 1s ease;
}

/* ===============================
   SCREENSHOT OVERLAY
================================*/

#screenshotOverlay{
position:fixed;
inset:0;
display:none;
align-items:center;
justify-content:center;
z-index:2000;
pointer-events:none;
}

.overlayBox{
background:rgba(0,0,0,0.5);
padding:24px 32px;
border-radius:16px;
color:white;
font-size:16px;
display:flex;
align-items:center;
gap:16px;
}

.spinner{
width:22px;
height:22px;
border:3px solid rgba(255,255,255,0.3);
border-top:3px solid white;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
to{transform:rotate(360deg);}
}

</style>


<script type="module">

let Application;
let screenshotCounter = 1;

import * as PixelStreamingWebSdk from
"https://unpkg.com/@arcware-cloud/pixelstreaming-websdk@1.3.32/index.mjs";

(() => {

const { ArcwareInit } = PixelStreamingWebSdk;

/* ===============================
   RANDOM SEAT SELECTION
================================*/

const shareIds=[
"share-ba04e7bb-3b1c-4c4f-89f4-dddfae1001e5",
"share-ba04e7bb-3b1c-4c4f-89f4-dddfae1001e5",
"share-ba04e7bb-3b1c-4c4f-89f4-dddfae1001e5"
];

const selectedShareId=
shareIds[Math.floor(Math.random()*shareIds.length)];

console.log("Arcware seat selected:",selectedShareId);

const initResult=new ArcwareInit(
{shareId:selectedShareId},
{
initialSettings:{
AutoConnect:true,
AutoPlayVideo:true,
StartVideoMuted:false
},
settings:{
infoButton:false,
micButton:false,
audioButton:false,
fullscreenButton:false,
settingsButton:false,
connectionStrengthIcon:false
}
}
);

Application=initResult.Application;

/* ===============================
   RESPONSES FROM UNREAL
================================*/

Application.getApplicationResponse((response)=>{

try{

const parsed=JSON.parse(response);

if(parsed.screenshot==="generating"){
showOverlay("Generating high resolution image");
}

}catch(e){}

if(response.startsWith("CreateScreenshot")){
createFile(window.file);
}

});

/* ===============================
   ATTACH STREAM
================================*/

setTimeout(()=>{

document
.getElementById("video-container")
.appendChild(Application.rootElement);

});

/* ===============================
   INTRO SEQUENCE
================================*/

startIntro();

window.file=Application.webRtcController.file;

})();

/* ===============================
   INTRO LOGO
================================*/

function startIntro(){

const logo=document.getElementById("unrealLogo");
const video=document.getElementById("introVideo");

/* fade in logo + slight scale */

setTimeout(()=>{
logo.style.opacity=1;
logo.style.transform="scale(1)";
},300);

/* hold slightly longer then fade out */

setTimeout(()=>{
logo.style.opacity=0;
},2500);

/* start intro video */

setTimeout(()=>{
video.style.opacity=1;
video.play().catch(()=>{});
},3400);

/* after 9 seconds fade to black */

setTimeout(()=>{
document.getElementById("blackFade").style.opacity=1;
},12400);

/* remove overlay completely */

setTimeout(()=>{
const overlay=document.getElementById("introOverlay");
const fade=document.getElementById("blackFade");

overlay.remove();
fade.remove();

},13400);

}

/* ===============================
   SCREENSHOT FUNCTIONS
================================*/

function showOverlay(message){

document.getElementById("overlayText").innerText=message;
document.getElementById("screenshotOverlay").style.display="flex";

}

function hideOverlay(){

document.getElementById("screenshotOverlay").style.display="none";

}

function createFile(file){

const blob=new Blob(file.data,{type:file.mimetype});

const counterString=String(screenshotCounter).padStart(2,"0");

const fileName=`screenshot${counterString}${file.extension}`;

if(window.showSaveFilePicker){

(async()=>{

try{

const handle=await window.showSaveFilePicker({
suggestedName:fileName,
types:[{description:"PNG Image",accept:{"image/png":[".png"]}}]
});

hideOverlay();

const writable=await handle.createWritable();
await writable.write(blob);
await writable.close();

}catch(err){

hideOverlay();

}

})();

}else{

const url=URL.createObjectURL(blob);

const a=document.createElement("a");

a.href=url;
a.download=fileName;

document.body.appendChild(a);
a.click();
document.body.removeChild(a);

URL.revokeObjectURL(url);

document.getElementById("overlayText").innerText=
"Your image has been saved";

setTimeout(hideOverlay,2000);

}

screenshotCounter++;

}

</script>

</head>


<body>

<div id="video-container"></div>

<!-- INTRO VIDEO -->

<div id="introOverlay">

<img id="unrealLogo" src="UNREAL LOGO.png">

<video
id="introVideo"
src="IntroSequence06.mp4"
muted
playsinline>
</video>

</div>

<div id="blackFade"></div>

<!-- SCREENSHOT OVERLAY -->

<div id="screenshotOverlay">
<div class="overlayBox">
<div class="spinner"></div>
<div id="overlayText">Generating high resolution image</div>
</div>
</div>

</body>
</html>
